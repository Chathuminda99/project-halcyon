---
# Project Halcyon — top-level playbook.
# Run explicitly after `vagrant up` (which only boots the VMs - see
# Vagrantfile), normally via scripts/deploy.sh:
#   ansible-playbook -i ansible/inventory.yml ansible/site.yml
# The `attacker` group (Kali) is intentionally never targeted here - it's the
# tester's own box, not a provisioned lab target.

- name: Wait for guests to accept connections (right after vagrant up)
  hosts: windows:linux
  gather_facts: false
  tasks:
    - name: Wait for WinRM/SSH to come up
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 900

- name: Guard - secrets seed must exist
  hosts: all
  gather_facts: false
  vars_files:
    - group_vars/secrets_seed.yml
  roles:
    - randomize

- name: Domain controller - forest, DNS, AD CS
  hosts: domain_controllers
  vars_files:
    - group_vars/secrets_seed.yml
  roles:
    - ad_forest
    - adcs
    - ad_identities
    - posture

- name: Member server - MSSQL
  hosts: member_servers
  vars_files:
    - group_vars/secrets_seed.yml
  roles:
    - mssql
    - posture

- name: Windows clients
  hosts: clients
  vars_files:
    - group_vars/secrets_seed.yml
  roles:
    - domain_join_win
    - posture

- name: Linux web server
  hosts: linux
  vars_files:
    - group_vars/secrets_seed.yml
  roles:
    - linux_web
    - web_app
